services:
  ingest-service:
    build: ./ingest-service
    ports:
      - "8080:8080"
    environment:
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://alloy:4318
      - OTEL_TRACES_EXPORTER=none # disable traces for this demo
      - OTEL_METRICS_EXPORTER=none # disable metrics for this demo
      - OTEL_RESOURCE_ATTRIBUTES=service.name=ingest-service,service.namespace=loki-rca-demo

  extract-service:
    build: ./extract-service
    ports:
      - "8081:8080"
    environment:
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://alloy:4318
      - OTEL_TRACES_EXPORTER=none # disable traces for this demo
      - OTEL_METRICS_EXPORTER=none # disable metrics for this demo
      - OTEL_RESOURCE_ATTRIBUTES=service.name=extract-service,service.namespace=loki-rca-demo

  alloy:
    image: docker.io/grafana/alloy:latest
    ports:
      - "4317:4317/tcp" # OTLP gRPC
      - "4318:4318/tcp" # OTLP HTTP
    environment:
      - GRAFANA_CLOUD_OTLP_ENDPOINT=${GRAFANA_CLOUD_OTLP_ENDPOINT}
      - GRAFANA_CLOUD_OTLP_USERNAME=${GRAFANA_CLOUD_OTLP_USERNAME}
      - GRAFANA_CLOUD_ACCESS_POLICY_TOKEN=${GRAFANA_CLOUD_ACCESS_POLICY_TOKEN}
    volumes:
      - ./alloy/config.alloy:/etc/alloy/config.alloy:z

  k6:
    image: docker.io/grafana/k6:latest
    volumes:
      - ./loadtest/script.js:/script.js:z
    command: run /script.js
    restart: always
