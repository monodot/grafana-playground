version: "3.8"

services:
  postgres:
    image: docker.io/library/postgres:16
    environment:
      POSTGRES_DB: demo
      POSTGRES_USER: demo
      POSTGRES_PASSWORD: demo
    volumes:
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:z
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U demo -d demo"]
      interval: 5s
      timeout: 5s
      retries: 5
    stop_grace_period: 0s

  java-server:
    build: ./java-server
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/demo
      DB_USER: demo
      DB_PASSWORD: demo
    ports:
      - "18081:18081"
    stop_grace_period: 0s

  java-otel-server:
    build: ./java-otel-server
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/demo
      DB_USER: demo
      DB_PASSWORD: demo
      OTEL_SERVICE_NAME: java-otel-server
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-lgtm:4318
      OTEL_LOG_LEVEL: debug
    ports:
      - "18082:18082"
    stop_grace_period: 0s

  node-client:
    build: ./node-client
    depends_on:
      - java-server
      - java-otel-server
    environment:
      JAVA_SERVER_HOST: java-server
      JAVA_SERVER_PORT: "18081"
      JAVA_OTEL_SERVER_HOST: java-otel-server
      JAVA_OTEL_SERVER_PORT: "18082"
      LISTEN_PORT: "3001"
      INTERVAL_MS: "5000"
    ports:
      - "3001:3001"
    stop_grace_period: 0s

  nginx:
    image: docker.io/library/nginx:latest
    depends_on:
      - node-client
    ports:
      - "18080:18080"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:z
    stop_grace_period: 0s

  beyla:
    image: docker.io/grafana/beyla:3
    pid: host
    privileged: true
    depends_on:
      - java-server
      - java-otel-server
      - node-client
      - nginx
    environment:
      BEYLA_CONFIG_PATH: /config/beyla-config.yaml
#      BEYLA_TRACE_PRINTER: text
#      BEYLA_LOG_LEVEL: debug
#      BEYLA_OPEN_PORT: "18080,3001,18081,18082,5432" # nginx → node-client → java-server / java-otel-server → postgres
#      BEYLA_BPF_CONTEXT_PROPAGATION: all
#      BEYLA_JAVA_JVMTOOLS_ENABLED: "false" # prevent Beyla injecting its own Java agent; OTel Java agent handles java-otel-server
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://otel-lgtm:4317"
    volumes:
      - ./beyla:/config:z
    stop_grace_period: 0s

  otel-lgtm:
    image: docker.io/grafana/otel-lgtm:latest
    ports:
      - "3000:3000"
      - "4317:4317"
      - "4318:4318"
    stop_grace_period: 0s
    # Uncomment these if you like logs
    # environment:
    #   - ENABLE_LOGS_TEMPO=true
    #   - ENABLE_LOGS_OTELCOL=true
