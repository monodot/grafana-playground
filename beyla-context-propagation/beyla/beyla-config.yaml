trace_printer: text
log_level: debug

open_port: "18080,3001,18081,18082,5432" # Does this take precedence over everything else?

# Enable this so that Beyla can apply context-propagation between Beyla-instrumented services and manually instrumented services
ebpf:
  context_propagation: all

#javaagent:
#  enabled: false  # don't attach the agent
#nodejs:
#  enabled: false  # don't attach the agent to Node.js processes

discovery:
  exclude_otel_instrumented_services: true
