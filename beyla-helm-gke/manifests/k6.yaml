apiVersion: v1
kind: ConfigMap
metadata:
  name: k6-script
data:
  script.js: |
    import http from 'k6/http';
    import { sleep } from 'k6';

    export const options = {
      vus: 1,
      duration: '24h',
    };

    export default function () {
      http.get('http://node-server:3000');
      sleep(1);
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: k6
spec:
  replicas: 1
  selector:
    matchLabels:
      app: k6
  template:
    metadata:
      labels:
        app: k6
    spec:
      containers:
        - name: k6
          image: docker.io/grafana/k6:latest
          args:
            - run
            - /scripts/script.js
          volumeMounts:
            - name: k6-script
              mountPath: /scripts
      volumes:
        - name: k6-script
          configMap:
            name: k6-script
